services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: utg_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-utg_transport}
      MYSQL_USER: ${DB_USERNAME:-utg}
      MYSQL_PASSWORD: ${DB_PASSWORD:-utg_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - utg_net

  # ── Laravel Backend (PHP-FPM) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: utg_backend
    restart: unless-stopped
    env_file: ./backend/.env.docker
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor          # anonymous volume keeps vendor inside container
    depends_on:
      db:
        condition: service_healthy
    networks:
      - utg_net

  # ── Nginx for Backend API ─────────────────────────────────────────────────
  backend_nginx:
    image: nginx:1.27-alpine
    container_name: utg_backend_nginx
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - utg_net
    ports:
      - "${BACKEND_PORT:-8000}:80"

  # ── Vue 3 Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: utg_frontend
    restart: unless-stopped
    networks:
      - utg_net
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # ── Queue Worker ──────────────────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: utg_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: ./backend/.env.docker
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - utg_net

volumes:
  db_data:

networks:
  utg_net:
    driver: bridge
